title: Encoded PowerShell command line
id: drb-a-encoded-powershell
status: experimental
description: >
  Any command line invoking PowerShell with an encoded command (-enc /
  -EncodedCommand), a common obfuscated-execution pattern. Image-agnostic so it
  catches both cmd.exe wrappers and PowerShell spawned directly by another
  process (e.g. an Empire regsvr32 launcher).
level: high
tags:
  - attack.t1059.001
  - attack.execution
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains: 'powershell'
    CommandLine|re: '\s-e(nc|ncodedcommand)?\s'
  condition: selection
falsepositives:
  - Administrative scripts that legitimately pass encoded commands.
