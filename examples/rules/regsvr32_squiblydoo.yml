title: Regsvr32 remote scriptlet execution (Squiblydoo)
id: drb-a-regsvr32-squiblydoo
status: experimental
description: >
  regsvr32.exe loading scrobj.dll to execute a remote .sct scriptlet over HTTP,
  the "Squiblydoo" application-whitelisting bypass used by Empire launchers.
level: high
tags:
  - attack.t1218.010
  - attack.defense_evasion
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - 'scrobj.dll'
      - 'scrobj'
  http:
    CommandLine|re: 'https?://'
  condition: selection and http
falsepositives:
  - Rare legitimate use of remote scriptlets by installers.
